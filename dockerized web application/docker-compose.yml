version: '3.8'

services:

  # ── Flask Application ─────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: flask_app
    restart: unless-stopped
    environment:
      - APP_VERSION=1.0.0
      - ENVIRONMENT=production
    expose:
      - "5000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network

# ── Shared Network ─────────────────────────────────────────
networks:
  app-network:
    driver: bridge
